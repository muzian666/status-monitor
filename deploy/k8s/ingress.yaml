apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: status-monitor
  namespace: status-monitor
  annotations:
    nginx.ingress.kubernetes.io/websocket-services: status-monitor
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: status-monitor.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: status-monitor
                port:
                  number: 80
