apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: status-monitor
  namespace: status-monitor
spec:
  podSelector:
    matchLabels:
      app: status-monitor
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 8000
          protocol: TCP
  egress:
    # DNS (in-cluster kube-dns / CoreDNS)
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # The monitor must reach arbitrary user-defined targets on any host/port
    # (HTTP/TCP checks) and via ICMP (ping/traceroute). The previous policy only
    # allowed egress to in-cluster pods, so every external check was denied and
    # the app could not monitor anything outside the cluster.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
