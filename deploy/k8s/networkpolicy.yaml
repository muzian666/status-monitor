apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: status-monitor
  namespace: status-monitor
spec:
  podSelector:
    matchLabels:
      app: status-monitor
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 8000
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector: {}
    # Allow ICMP for ping checks
    - to:
        - namespaceSelector: {}
