apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: status-monitor
  namespace: status-monitor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: status-monitor
  minReplicas: 1
  # MUST stay 1 while the backing store is SQLite: multiple writers to one .db
  # file corrupt it, and each replica runs its own scheduler/WebSocket fan-out.
  # Bump this only after migrating to a shared DB (Postgres/MySQL) + leader
  # election. See issue #1.
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
