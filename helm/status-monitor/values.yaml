replicaCount: 1

image:
  repository: status-monitor
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/websocket-services: "{{ .Release.Name }}"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  hosts:
    - host: status-monitor.local
      paths:
        - path: /
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  # MUST stay 1 while the backing store is SQLite: multiple writers to one .db
  # file corrupt it, and each replica runs its own scheduler/WebSocket fan-out.
  # Raise only after migrating to a shared DB (Postgres/MySQL) + leader election.
  # See issue #1.
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  storageClassName: standard
  size: 1Gi

config:
  SM_DEBUG: "false"
  SM_HOST: "0.0.0.0"
  SM_PORT: "8000"
  SM_DATA_DIR: "/app/data"

securityContext:
  capabilities:
    add: ["NET_RAW"]

networkPolicy:
  enabled: true
